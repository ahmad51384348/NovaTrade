
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTrade</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0e11;
color:white;
}

header{
background:#161a1e;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.logo{
font-size:24px;
font-weight:bold;
color:#f3ba2f;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

.banner{
padding:40px 20px;
text-align:center;
}

.banner h1{
font-size:40px;
margin-bottom:10px;
}

.banner p{
color:#bbb;
margin-bottom:20px;
}

button{
background:#f3ba2f;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.market{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:15px;
border-bottom:1px solid #333;
text-align:center;
}

.green{
color:#0ecb81;
}

.red{
color:#f6465d;
}
</style>
</head>

<body>

<header>
<div class="logo">🚀 NovaTrade</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الأسواق</a>
<a href="#">المحفظة</a>
<a href="#">تسجيل الدخول</a>
</nav>
</header>

<section class="banner">

<h1>ابدأ التداول الآن</h1>

<p>
منصة تداول احترافية للعملات الرقمية
</p>

<button>ابدأ الآن</button>

</section>

<section class="market">

<h2>الأسواق</h2>

<table>

<tr>
<th>العملة</th>
<th>السعر</th>
<th>التغير</th>
</tr>

<tr>
<td>Bitcoin (BTC)</td>
<td>$118,200</td>
<td class="green">+2.4%</td>
</tr>

<tr>
<td>Ethereum (ETH)</td>
<td>$3,850</td>
<td class="green">+1.8%</td>
</tr>

<tr>
<td>BNB</td>
<td>$710</td>
<td class="red">-0.6%</td>
</tr>

<tr>
<td>Solana (SOL)</td>
<td>$185</td>
<td class="green">+4.3%</td>
</tr>

</table>

</section>

</body>
</html>
