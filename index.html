<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTrade</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0e11;
color:white;
}

header{
background:#11151c;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#f0b90b;
font-size:30px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
transition:.3s;
}

nav a:hover{
color:#f0b90b;
}

.buttons button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-right:10px;
font-weight:bold;
}

.login{
background:transparent;
color:white;
border:1px solid #f0b90b;
}

.signup{
background:#f0b90b;
color:black;
}
</style>
</head>

<body>

<header>

<div class="logo">🚀 NovaTrade</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الأسواق</a>
<a href="#">التداول</a>
<a href="#">المحفظة</a>
</nav>

<div class="buttons">
<button class="login">تسجيل الدخول</button>
<button class="signup">ابدأ الآن</button>
</div>

</header>

</body>
</html>
