
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTrade</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0e11;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#11151c;
border-bottom:1px solid #222;
position:sticky;
top:0;
}

.logo{
font-size:32px;
font-weight:bold;
color:#f0b90b;
}

nav{
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:#f0b90b;
}

.buttons button{
padding:10px 18px;
margin-right:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.login{
background:transparent;
border:1px solid #f0b90b;
color:white;
}

.signup{
background:#f0b90b;
color:black;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:48px;
color:#f0b90b;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#bbb;
margin-bottom:35px;
}

.hero button{
padding:16px 35px;
background:#f0b90b;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
font-weight:bold;
}

.market{
padding:40px 20px;
}

.market h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:16px;
border-bottom:1px solid #333;
text-align:center;
}

.green{
color:#00d084;
}

.red{
color:#ff4d4f;
}

footer{
text-align:center;
padding:30px;
background:#11151c;
margin-top:40px;
color:#888;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:15px;
}

nav{
flex-wrap:wrap;
justify-content:center;
}

table{
font-size:14px;
}

.hero h1{
font-size:34px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">🚀 NovaTrade</div>

<nav>

<a href="#">الرئيسية</a>
<a href="#">الأسواق</a>
<a href="#">التداول</a>
<a href="#">المحفظة</a>

</nav>

<div class="buttons">

<button class="login">دخول</button>

<button class="signup">إنشاء حساب</button>

</div>

</header>

<section class="hero">

<h1>ابدأ الاستثمار اليوم</h1>

<p>منصة حديثة لتداول العملات الرقمية بسهولة وأمان.</p>

<button>ابدأ الآن</button>

</section>

<section class="market">

<h2>الأسواق</h2>

<table>

<tr>

<th>العملة</th>

<th>السعر</th>

<th>التغير</th>

</tr>

<tr>

<td>Bitcoin</td>

<td id="btc">$118,240</td>

<td class="green">+2.5%</td>

</tr>

<tr>

<td>Ethereum</td>

<td id="eth">$3,180</td>

<td class="green">+1.4%</td>

</tr>

<tr>

<td>BNB</td>

<td id="bnb">$720</td>

<td class="red">-0.4%</td>

</tr>

<tr>

<td>Solana</td>

<td id="sol">$168</td>

<td class="green">+3.2%</td>

</tr>

</table>

</section>

<footer>

© 2026 NovaTrade

</footer>

<script>

function random(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

setInterval(()=>{

document.getElementById("btc").innerHTML="$"+random(117800,118600);

document.getElementById("eth").innerHTML="$"+random(3150,3210);

document.getElementById("bnb").innerHTML="$"+random(710,730);

document.getElementById("sol").innerHTML="$"+random(160,175);

},2000);

</script>

</body>

</html>
