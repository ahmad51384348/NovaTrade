<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTrade</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0e11;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#11151c;
position:sticky;
top:0;
}

.logo{
font-size:34px;
font-weight:bold;
color:#f0b90b;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-size:18px;
}

nav a:hover{
color:#f0b90b;
}

.buttons button{
padding:10px 18px;
margin-right:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.login{
background:transparent;
border:2px solid #f0b90b;
color:white;
}

.signup{
background:#f0b90b;
color:black;
font-weight:bold;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:52px;
color:#f0b90b;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#ccc;
margin-bottom:35px;
}

.hero button{
padding:18px 45px;
font-size:22px;
background:#f0b90b;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#161a22;
padding:25px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
color:#f0b90b;
margin-bottom:10px;
}

.price{
font-size:30px;
margin-top:15px;
}

.green{
color:#00ff99;
}

footer{
text-align:center;
padding:25px;
background:#11151c;
margin-top:40px;
color:#aaa;
}
</style>

</head>

<body>

<header>

<div class="logo">🚀 NovaTrade</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الأسواق</a>
<a href="#">التداول</a>
<a href="#">المحفظة</a>
</nav>

<div class="buttons">
<button class="login">تسجيل الدخول</button>
<button class="signup">إنشاء حساب</button>
</div>

</header>

<section class="hero">

<h1>تداول العملات الرقمية بسهولة</h1>

<p>منصة NovaTrade لتداول العملات الرقمية بسرعة وأمان.</p>

<button>ابدأ الآن</button>

</section>

<section class="cards">

<div class="card">
<h2>Bitcoin</h2>
<div class="price green">$67,420</div>
</div>

<div class="card">
<h2>Ethereum</h2>
<div class="price green">$3,420</div>
</div>

<div class="card">
<h2>BNB</h2>
<div class="price green">$592</div>
</div>

<div class="card">
<h2>Solana</h2>
<div class="price green">$151</div>
</div>

</section>

<footer>

© 2026 NovaTrade

</footer>

</body>
</html>
